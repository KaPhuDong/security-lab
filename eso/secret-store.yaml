# Lab 2.1 - SecretStore: kết nối tới AWS Secrets Manager
# TH2: minikube lab → dùng secretRef (access key), không có IRSA
# aws-creds Secret tạo tay bằng kubectl, KHÔNG commit vào git:
#   kubectl create secret generic aws-creds -n demo \
#     --from-literal=access-key=<AWS_ACCESS_KEY_ID> \
#     --from-literal=secret-key=<AWS_SECRET_ACCESS_KEY>
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-store
  namespace: demo
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-creds
            key: access-key
          secretAccessKeySecretRef:
            name: aws-creds
            key: secret-key
