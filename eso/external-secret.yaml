# Lab 2.1 - ExternalSecret: sync DB password từ AWS Secrets Manager vào K8s Secret
# refreshInterval: 1m → ESO poll AWS mỗi 60s → cập nhật Secret < 60s
# Pod mount Secret qua volume → tự reload không cần restart
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-creds
  namespace: demo
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-store
    kind: SecretStore
  target:
    name: db-secret          # K8s Secret sẽ được tạo
    creationPolicy: Owner    # ESO quản lý lifecycle của Secret này
  data:
  - secretKey: password
    remoteRef:
      key: demo/db/password  # path trong AWS Secrets Manager
  - secretKey: username
    remoteRef:
      key: demo/db/username
