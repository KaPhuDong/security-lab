# Test: Pod chạy root → REJECT (F-04)
apiVersion: v1
kind: Pod
metadata:
  name: pod-bad-root
  namespace: demo
spec:
  containers:
  - name: app
    image: nginx:1.25.3
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
    securityContext:
      runAsUser: 0               # vi phạm: chạy root
