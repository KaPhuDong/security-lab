# Test: Pod hợp lệ → phải PASS tất cả constraints
apiVersion: v1
kind: Pod
metadata:
  name: pod-valid
  namespace: demo
  labels:
    owner: team-platform
spec:
  containers:
  - name: app
    image: ghcr.io/kaphudong/w10-api:0.1.0   # pinned version, registry cụ thể
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
    securityContext:
      runAsUser: 1000                          # non-root
  securityContext:
    runAsNonRoot: true
