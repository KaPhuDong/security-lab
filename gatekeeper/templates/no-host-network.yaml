# ConstraintTemplate: Cấm hostNetwork: true
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snohostnetwork
  annotations:
    description: "Cấm Pod dùng hostNetwork: true"
spec:
  crd:
    spec:
      names:
        kind: K8sNoHostNetwork
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8snohostnetwork

      violation[{"msg": msg}] {
        input.review.object.spec.hostNetwork == true
        msg := "Pod bị cấm dùng hostNetwork: true. Cách ly network pod khỏi host."
      }
