# ConstraintTemplate: Bắt buộc workload có label 'owner' (Custom Policy - Lab 1.3)
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequireownerlabel
  annotations:
    description: "Bắt buộc mọi Deployment/Rollout phải có label 'owner' để biết team chịu trách nhiệm"
spec:
  crd:
    spec:
      names:
        kind: K8sRequireOwnerLabel
      validation:
        openAPIV3Schema:
          properties:
            labels:
              type: array
              items:
                type: string
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8srequireownerlabel

      violation[{"msg": msg}] {
        provided := {label | input.review.object.metadata.labels[label]}
        required := {label | label := input.parameters.labels[_]}
        missing := required - provided
        count(missing) > 0
        msg := sprintf("Workload '%v' thiếu label bắt buộc: %v. Thêm label để xác định team chịu trách nhiệm.", [input.review.object.metadata.name, missing])
      }
