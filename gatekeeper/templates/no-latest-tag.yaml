# ConstraintTemplate: Cấm image tag :latest (F-01)
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8snolatesttag
  annotations:
    description: "Cấm dùng image tag :latest hoặc không có tag"
spec:
  crd:
    spec:
      names:
        kind: K8sNoLatestTag
  targets:
  - target: admission.k8s.gatekeeper.sh
    rego: |
      package k8snolatesttag

      violation[{"msg": msg}] {
        container := input.review.object.spec.containers[_]
        has_latest_tag(container.image)
        msg := sprintf("Container '%v' dùng image tag :latest hoặc không pin version: '%v'. Phải dùng tag cụ thể.", [container.name, container.image])
      }

      violation[{"msg": msg}] {
        container := input.review.object.spec.initContainers[_]
        has_latest_tag(container.image)
        msg := sprintf("InitContainer '%v' dùng image tag :latest hoặc không pin version: '%v'.", [container.name, container.image])
      }

      has_latest_tag(image) {
        endswith(image, ":latest")
      }

      has_latest_tag(image) {
        not contains(image, ":")
      }
