# PostSync hook: chờ tất cả CRD từ ConstraintTemplates được sinh ra
# ArgoCD sẽ chờ Job này complete trước khi tiến sang wave tiếp theo
# CRD name = <template metadata.name> + "s" (Gatekeeper convention)
#   k8snohostnetwork      → k8snohostnetworks.constraints.gatekeeper.sh
#   k8snolatesttag        → k8snolatesttags.constraints.gatekeeper.sh
#   k8snorunasroot        → k8snorunasroots.constraints.gatekeeper.sh
#   k8srequireownerlabel  → k8srequireownerlabels.constraints.gatekeeper.sh
#   k8srequireresourcelimit → k8srequireresourcelimits.constraints.gatekeeper.sh
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-gatekeeper-crds
  namespace: gatekeeper-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      serviceAccountName: default
      restartPolicy: OnFailure
      containers:
      - name: wait
        image: bitnami/kubectl:1.29.4
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for Gatekeeper CRDs to be established..."
          MAX_WAIT=120
          ELAPSED=0
          while true; do
            ALL_READY=true
            for crd in \
              k8snohostnetworks.constraints.gatekeeper.sh \
              k8snolatesttags.constraints.gatekeeper.sh \
              k8snorunasroots.constraints.gatekeeper.sh \
              k8srequireownerlabels.constraints.gatekeeper.sh \
              k8srequireresourcelimits.constraints.gatekeeper.sh; do
              if kubectl get crd "$crd" >/dev/null 2>&1; then
                echo "  [OK] $crd"
              else
                echo "  [WAIT] $crd not ready yet"
                ALL_READY=false
              fi
            done
            if [ "$ALL_READY" = "true" ]; then
              echo "All Gatekeeper CRDs are ready! Wave 1 can proceed."
              exit 0
            fi
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "ERROR: Timeout after ${MAX_WAIT}s waiting for CRDs"
              exit 1
            fi
            echo "Retrying in 10s... (${ELAPSED}/${MAX_WAIT}s elapsed)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
