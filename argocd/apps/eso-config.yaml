# ArgoCD App: Deploy SecretStore + ExternalSecret config
# sync-wave: 1 → SAU ESO operator (-1) để CRD đã tồn tại
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/KaPhuDong/security-lab.git
    path: eso
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 1
        maxDuration: 60s
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
