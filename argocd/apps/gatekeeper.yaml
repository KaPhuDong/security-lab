# ArgoCD App: Deploy OPA Gatekeeper controller
# sync-wave: -1 để install controller trước policies
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://open-policy-agent.github.io/gatekeeper/charts
    chart: gatekeeper
    targetRevision: 3.17.2
    helm:
      values: |
        replicas: 1
        auditInterval: 60
        validatingWebhookTimeoutSeconds: 10
        mutatingWebhookTimeoutSeconds: 10
        podDisruptionBudget:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
