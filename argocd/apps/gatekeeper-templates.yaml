# ArgoCD App: Deploy Gatekeeper ConstraintTemplates
# sync-wave: 0 → sau controller (-1), trước constraints (1)
# ConstraintTemplates là cluster-scoped resources → destination namespace để trống
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-templates
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/KaPhuDong/security-lab.git
    path: gatekeeper/templates
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: ""
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
