# ArgoCD App: Deploy Gatekeeper ConstraintTemplates + Constraints trong 1 App
# Templates (wave 0) apply trước → Gatekeeper sinh CRD → Constraints (wave 1) apply sau
# Không cần Job/hook, không cần 2 App riêng → sync nhanh hơn nhiều
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/KaPhuDong/security-lab.git
    path: gatekeeper/policies
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 1
        maxDuration: 30s
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
